name: Auto-merge Dependabot

# When Dependabot opens (or rebases) a PR, this workflow enables GitHub's
# native auto-merge on it. The merge then fires automatically once all
# required status checks pass and there are no conflicts. CI is the gate;
# if tests/lint/etc. fail, auto-merge stays parked and the PR waits for
# a human.
#
# Why this exists: Dependabot bumps were piling up open across the org
# because no human was clicking merge. With this workflow + the auto-skip
# workflow (rolled out via #99), green Dependabot PRs land on their own.
#
# Prerequisites (handled by the rollout script, not this workflow):
#   - The repo must have `allow_auto_merge: true` enabled in settings.
#     `gh pr merge --auto` errors out if the repo setting is off.
#   - Branch protection should require CI to pass (already true on every
#     org repo) so auto-merge has a meaningful gate.
#
# Idempotent: re-running on a PR that already has auto-merge enabled is
# a no-op (gh prints a notice and exits 0).
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo;
# change upstream and re-roll via scripts/rollout_dependabot_auto_merge.sh.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: [self-hosted, linux, x64, ss-vps]
    steps:
      - name: Enable auto-merge on the Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          echo "== Auto-merge for Dependabot PR ${REPO}#${PR_NUMBER} =="
          echo "PR: ${PR_URL}"

          # Enable GitHub native auto-merge with squash + delete branch.
          # The merge will fire automatically when:
          #   - All required status checks pass
          #   - No merge conflicts
          #   - Required approvals met (org default is 0)
          #
          # If auto-merge is already enabled on this PR, gh prints a
          # notice and exits 0; treat that as success.
          gh pr merge --auto --squash --delete-branch "$PR_URL"

          echo "Done."
