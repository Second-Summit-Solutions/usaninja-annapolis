name: Auto-skip-issue-link for Dependabot

# Dependabot PRs never link to a tracked issue, so they would otherwise
# fail the `require-spec-pr-check` workflow (which requires either a
# `Closes #N` linked issue OR `skip-issue-link` label + a
# "Skip-issue-link: <reason>" body line). This workflow auto-applies
# both bypass markers on every Dependabot PR.
#
# Idempotent: re-running on the same PR is a no-op (label re-add is silent,
# body line is only appended if missing).
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo;
# change upstream and re-roll via scripts/rollout_dependabot_skip_workflow.sh.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  apply-skip:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: [self-hosted, linux, x64, ss-vps]
    steps:
      - name: Apply skip-issue-link label and body line
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SKIP_LINE: "Skip-issue-link: Automated dependency update by Dependabot — no human-tracked issue."
        run: |
          set -euo pipefail

          echo "== Auto-skip for Dependabot PR ${REPO}#${PR_NUMBER} =="

          # Ensure the label exists (idempotent; --force upserts).
          # Color BFD4F2 matches the request in github-repo-creator#99.
          gh label create skip-issue-link \
            --repo "$REPO" \
            --color "BFD4F2" \
            --description "PR doesn't need a linked issue" \
            --force >/dev/null 2>&1 || true

          # Add the label (idempotent — gh succeeds if already present).
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label skip-issue-link

          # Read current PR body and append the marker line if missing.
          body="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""')"

          if echo "$body" | grep -qE '^[[:space:]]*Skip-issue-link:[[:space:]]*\S'; then
            echo "Skip-issue-link line already present in body — leaving body unchanged."
          else
            echo "Appending Skip-issue-link line to PR body."
            tmpfile="$(mktemp)"
            {
              printf '%s\n\n' "$body"
              printf '%s\n' "$SKIP_LINE"
            } > "$tmpfile"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --body-file "$tmpfile"
            rm -f "$tmpfile"
          fi

          echo "Done."
