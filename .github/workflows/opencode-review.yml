name: OpenCode AI Review (DeepSeek)

# Soft, non-blocking AI review using OpenCode + DeepSeek.
# Posts a structured rubric review as a PR COMMENT (never APPROVE).
# The status check `check-opencode-review` is intentionally NOT a required
# status — Claude (PAT) remains the formal reviewer of record.
#
# Skip conditions:
#   - paths-ignore filter (docs/*, *.md, workflow YAML, license/gitignore)
#   - job-level size gate (PR must change >=15 lines or >=3 files)
#   - dependabot PRs
#   - `skip-ai-review` label
#   - draft PRs
#
# Error contract: if OpenCode is unavailable, posts a short comment and
# exits 0 — the soft-signal pattern never blocks merge.
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo; PR
# changes upstream and re-roll via the rollout script.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Skip the workflow entirely for changes that are not worth an AI review:
    # docs, plain markdown, and meta config files. A mixed docs+code PR will
    # still trigger because GitHub fires the workflow when ANY changed file
    # falls outside paths-ignore. Surfaced in ss-gh-runners#125.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/**/*.yml'
      - '.github/**/*.yaml'
      - '.github/**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - 'CODEOWNERS'

permissions:
  issues: read
  pull-requests: write
  contents: read
  statuses: write

concurrency:
  group: opencode-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: [self-hosted, linux, x64, ss-vps]
    timeout-minutes: 10
    # Size gate — skip trivial PRs (e.g. 2-line `# nosemgrep` patches) that
    # don't benefit from an AI review and just burn a runner slot. Triggers
    # review only when the PR is non-trivial along at least one dimension:
    # >=15 additions, >=15 deletions, or >=3 files changed. Thresholds are
    # additive — a 14-line / 1-file PR is skipped; bump it to 15 lines OR
    # 3 files and it gets reviewed. Note: arithmetic (`additions + deletions`)
    # is NOT supported in GitHub Actions expressions, so the three dimensions
    # are checked separately. ss-gh-runners#125.
    if: |
      github.event.pull_request.additions >= 15 ||
      github.event.pull_request.deletions >= 15 ||
      github.event.pull_request.changed_files >= 3
    steps:
      - name: Checkout repo (for CLAUDE.md + prompt template)
        uses: actions/checkout@v4

      - name: Determine skip condition
        id: skip
        run: |
          AUTHOR='${{ github.event.pull_request.user.login }}'
          DRAFT='${{ github.event.pull_request.draft }}'

          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          reason=""
          if [ "$AUTHOR" = "dependabot[bot]" ]; then
            reason="dependabot"
          elif echo "$LABELS" | grep -q 'skip-ai-review'; then
            reason="skip-ai-review label"
          elif [ "$DRAFT" = "true" ]; then
            reason="draft PR"
          fi

          if [ -n "$reason" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit skip status (non-blocking)
        if: steps.skip.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Skipping AI review: ${{ steps.skip.outputs.reason }}"
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=success \
            -f context="check-opencode-review" \
            -f description="Skipped: ${{ steps.skip.outputs.reason }}" || true

      - name: Prepare MCP config and credentials
        if: steps.skip.outputs.skip == 'false'
        id: mcp_config
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VPS_FS_TOKEN: ${{ secrets.VPS_FS_TOKEN }}
        run: |
          set -euo pipefail

          CONFIG_TEMPLATE="$GITHUB_WORKSPACE/.github/opencode-review-config.json"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          CONFIG_TMP="/tmp/opencode_review_mcp_config_${PR_NUMBER}.json"

          if [ ! -f "$CONFIG_TEMPLATE" ]; then
            echo "::warning::MCP config template not found at $CONFIG_TEMPLATE — review will run without MCP access"
            echo "config_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # VPS_FS_TOKEN now comes from GH Actions org secret (set via env: on this step)
          # See parent commit for context on why vault helper is unreachable from runner.

          if [ -n "$VPS_FS_TOKEN" ]; then
            echo "vps-fs MCP enabled with vault token"
            cp "$CONFIG_TEMPLATE" "$CONFIG_TMP"
            echo "VPS_FS_TOKEN=${VPS_FS_TOKEN}" >> "$GITHUB_ENV"
          else
            echo "::warning::VPS_FS_TOKEN not found in vault — vps-fs MCP will be disabled"
            jq '.mcp["vps-fs"].enabled = false' "$CONFIG_TEMPLATE" > "$CONFIG_TMP" 2>/dev/null || {
              echo "::notice::jq failed; running without MCP config"
              echo "config_path=" >> "$GITHUB_OUTPUT"
              exit 0
            }
          fi

          # Layer 2 fix for #163 (final): use GH Actions org secret instead of vault helper.
          # The vault helper at /opt/ss-cron-system/vault/get-cred.py is on the HOST
          # filesystem and isn't mounted into the runner container, so the helper can't
          # run from inside the runner. DEEPSEEK_API_KEY is now set as an org secret
          # (visibility: all) and passed via the step's env block.
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            echo "DeepSeek key from GH Actions secret"
            echo "DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}" >> "$GITHUB_ENV"
          else
            echo "::error::DEEPSEEK_API_KEY secret not set — opencode review cannot run"
            echo "config_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "config_path=$CONFIG_TMP" >> "$GITHUB_OUTPUT"

          # Layer 3 fix for #163: container can't reach host's MCP servers via 'theclaw2'
          # (resolves to container loopback). Rewrite to host.docker.internal which is provided
          # by docker-compose extra_hosts: host-gateway in ss-gh-runners (separate PR).
          sed -i 's|http://theclaw2:|http://host.docker.internal:|g' "$CONFIG_TMP"
          echo "Rewrote MCP URLs: theclaw2 → host.docker.internal"

          echo "MCP config written to $CONFIG_TMP"

      - name: Gather context and run review
        if: steps.skip.outputs.skip == 'false'
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          OPENCODE_CONFIG: ${{ steps.mcp_config.outputs.config_path }}
        run: |
          set -euo pipefail

          MAX_CHARS=200000
          OPENCODE_TIMEOUT=300
          WORKDIR="$GITHUB_WORKSPACE"

          echo "== OpenCode AI Review for ${REPO}#${PR_NUMBER} =="

          # ── MCP config status ──
          if [ -n "${OPENCODE_CONFIG:-}" ] && [ -f "$OPENCODE_CONFIG" ]; then
            echo "MCP config loaded from $OPENCODE_CONFIG"
            echo "Enabled MCP servers: $(jq -r '.mcp | to_entries | map(select(.value.enabled == true) | .key) | join(", ")' "$OPENCODE_CONFIG")"
          else
            echo "No MCP config — review will use PR-local context only"
          fi

          # ── PR diff ──
          PR_DIFF="$(gh pr diff "$PR_NUMBER" --repo "$REPO")"
          echo "PR diff: $(echo "$PR_DIFF" | wc -c) chars"

          # ── PR title + body ──
          PR_JSON="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,body)"
          PR_TITLE="$(echo "$PR_JSON" | jq -r '.title')"
          PR_BODY="$(echo "$PR_JSON" | jq -r '.body // ""')"

          # ── Linked issue ──
          OWNER="${REPO%/*}"
          REPO_NAME="${REPO#*/}"

          LINKED="$(
            gh api graphql -f query='
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    closingIssuesReferences(first:5) {
                      nodes { number }
                    }
                  }
                }
              }' \
              -F owner="$OWNER" -F repo="$REPO_NAME" -F pr="$PR_NUMBER" \
              --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' \
              2>/dev/null || echo ""
          )"

          ISSUE_BODY=""
          SPEC=""

          if [ -n "$LINKED" ]; then
            ISSUE_NUM="$(echo "$LINKED" | head -1)"
            echo "Linked issue: #$ISSUE_NUM"

            ISSUE_BODY="$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json body --jq '.body // ""')"

            # Most recent ss-spec comment (if any)
            COMMENTS="$(gh api "repos/$REPO/issues/$ISSUE_NUM/comments" --paginate 2>/dev/null || echo '[]')"
            SPEC="$(echo "$COMMENTS" | jq -r '[.[] | select(.body | test("^<!-- ss-spec v=1"; "m"))] | last.body // ""' 2>/dev/null || echo "")"
            if [ -n "$SPEC" ]; then
              echo "Spec comment found"
            fi
          else
            echo "No linked issue found"
          fi

          echo "Issue body: $(echo "$ISSUE_BODY" | wc -c) chars"
          echo "Spec: $(echo "$SPEC" | wc -c) chars"

          # ── CLAUDE.md ──
          CLAUDE_MD=""
          if [ -f "$WORKDIR/CLAUDE.md" ]; then
            CLAUDE_MD="$(cat "$WORKDIR/CLAUDE.md")"
            echo "CLAUDE.md: $(echo "$CLAUDE_MD" | wc -c) chars"
          else
            echo "No CLAUDE.md at repo root"
          fi

          # ── Read prompt template ──
          TEMPLATE_PATH="$WORKDIR/.github/opencode-review-prompt.md"
          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "Prompt template not found at $TEMPLATE_PATH"
            EXIT_MSG="OpenCode review unavailable: prompt template missing (.github/opencode-review-prompt.md not found)"

            jq -n --arg body "$EXIT_MSG" '{event: "COMMENT", body: $body}' \
              | gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --input - || true

            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="check-opencode-review" \
              -f description="Template missing" || true
            exit 0
          fi

          TEMPLATE="$(cat "$TEMPLATE_PATH")"

          # ── Assemble prompt with truncation ──
          # Uses printf for multi-line blocks to avoid YAML literal-block issues.
          assemble_prompt() {
            local diff="$1" issue="$2" spec="$3" claude="$4" title="$5" body="$6" template="$7"
            local result="${template//'{{ PR_TITLE }}'/$title}"
            result="${result//'{{ PR_BODY }}'/$body}"
            result="${result//'{{ PR_DIFF }}'/$diff}"
            result="${result//'{{ ISSUE_BODY }}'/$issue}"

            if [ -n "$spec" ]; then
              result="${result//'{{ SPEC }}'/$(printf '## Spec from Linked Issue\n%s' "$spec")}"
            else
              result="${result//'{{ SPEC }}'/}"
            fi

            if [ -n "$claude" ]; then
              result="${result//'{{ CLAUDE_MD }}'/$(printf '## Repo Conventions (CLAUDE.md)\n%s' "$claude")}"
            else
              result="${result//'{{ CLAUDE_MD }}'/}"
            fi

            echo "$result"
          }

          PROMPT="$(assemble_prompt "$PR_DIFF" "$ISSUE_BODY" "$SPEC" "$CLAUDE_MD" "$PR_TITLE" "$PR_BODY" "$TEMPLATE")"
          PROMPT_SIZE="$(echo "$PROMPT" | wc -c)"
          echo "Assembled prompt: $PROMPT_SIZE chars"

          # ── Truncation loop ──
          TRUNC_DIFF="$PR_DIFF"
          TRUNC_ISSUE="$ISSUE_BODY"
          TRUNC_CLAUDE="$CLAUDE_MD"

          while [ "$(echo "$PROMPT" | wc -c)" -gt "$MAX_CHARS" ]; do
            # 1. Truncate issue body first
            if [ -n "$TRUNC_ISSUE" ] && [ "$(echo "$TRUNC_ISSUE" | wc -c)" -gt 3000 ]; then
              TRUNC_ISSUE="$(echo "$TRUNC_ISSUE" | head -c 3000)$(printf '\n\n... [issue body truncated]')"
              echo "... [issue body truncated to first 3k chars]"
            # 2. Truncate CLAUDE.md
            elif [ -n "$TRUNC_CLAUDE" ]; then
              TRUNC_CLAUDE=""
              echo "Dropped CLAUDE.md to fit token budget"
            # 3. Truncate diff (keep first portion)
            elif [ -n "$TRUNC_DIFF" ] && [ "$(echo "$TRUNC_DIFF" | wc -c)" -gt 100000 ]; then
              TRUNC_DIFF="$(echo "$TRUNC_DIFF" | head -c 100000)$(printf '\n\n... [diff truncated to first 100k chars]')"
              echo "... [diff truncated — remaining hunks omitted]"
            else
              echo "WARNING: prompt exceeds $MAX_CHARS chars after all truncations"
              break
            fi

            PROMPT="$(assemble_prompt "$TRUNC_DIFF" "$TRUNC_ISSUE" "$SPEC" "$TRUNC_CLAUDE" "$PR_TITLE" "$PR_BODY" "$TEMPLATE")"
            echo "Prompt after truncation: $(echo "$PROMPT" | wc -c) chars"
          done

          # ── Write prompt to temp file ──
          PROMPT_FILE="/tmp/opencode_review_prompt_${PR_NUMBER}.md"
          echo "$PROMPT" > "$PROMPT_FILE"
          echo "Prompt written to $PROMPT_FILE"

          # ── Run OpenCode ──
          REVIEW_OUT="/tmp/opencode_review_output_${PR_NUMBER}.txt"
          LOG_OUT="/tmp/opencode_review_logs_${PR_NUMBER}.txt"
          echo "Invoking opencode run (timeout ${OPENCODE_TIMEOUT}s)..."

          # stderr goes to a separate file so --print-logs noise doesn't end up
          # in the PR review body. GitHub's review body cap is 65,536 chars;
          # merged stderr+stdout regularly exceeded that on PRs with heavier
          # MCP usage, causing the POST to /pulls/:n/reviews to fail. See gh-rc#176/#184.
          if timeout "$OPENCODE_TIMEOUT" opencode run \
            --model deepseek/deepseek-chat \
            -f "$PROMPT_FILE" \
            --dangerously-skip-permissions \
            --print-logs \
            "Review this PR diff. Output ONLY the structured rubric with all required headings (DESIGN, COMPLEXITY, TESTS, NAMING / STYLE, RISK, SPEC ALIGNMENT, NOTES, CITATIONS). Use MCP tools to fetch org context before writing the rubric." \
            > "$REVIEW_OUT" 2> "$LOG_OUT"; then
            echo "OpenCode completed successfully"
            echo "--- opencode stderr/logs ---"
            cat "$LOG_OUT" || true
            echo "--- end opencode logs ---"
          else
            EXIT_CODE=$?
            echo "OpenCode failed or timed out (exit code: $EXIT_CODE)"
            echo "--- opencode stderr/logs ---"
            cat "$LOG_OUT" || true
            echo "--- end opencode logs ---"
            ERR_MSG="OpenCode review unavailable: $(head -c 500 "$LOG_OUT" 2>/dev/null || head -c 500 "$REVIEW_OUT" 2>/dev/null || echo "timeout after ${OPENCODE_TIMEOUT}s")"

            jq -n --arg body "$ERR_MSG" '{event: "COMMENT", body: $body}' \
              | gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --input - || true

            gh api "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="check-opencode-review" \
              -f description="OpenCode unavailable" || true

            rm -f "$PROMPT_FILE" "$REVIEW_OUT" "$LOG_OUT"
            exit 0
          fi

          REVIEW_BODY="$(cat "$REVIEW_OUT")"
          echo "Review output: $(echo "$REVIEW_BODY" | wc -c) chars"

          # ── Validate rubric headings ──
          RUBRIC_HEADINGS=("DESIGN" "COMPLEXITY" "TESTS" "NAMING / STYLE" "RISK" "SPEC ALIGNMENT" "NOTES")
          MISSING=()
          for h in "${RUBRIC_HEADINGS[@]}"; do
            if ! echo "$REVIEW_BODY" | grep -qE "^## ${h}[[:space:]]*$"; then
              MISSING+=("$h")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "WARNING: missing rubric headings: ${MISSING[*]}"
            REVIEW_BODY="${REVIEW_BODY}"$'\n\n---\n'"_(auto: missing headings: ${MISSING[*]})_"
            echo "$REVIEW_BODY" > "$REVIEW_OUT"
          fi

          # ── Cap body at GitHub's review-body limit (65536 chars) ──
          # Defensive backstop: even with stderr split off, large CITATIONS
          # tables can push us over. Truncate at 60k for footer headroom.
          MAX_REVIEW_BODY=60000
          ORIG_LEN=${#REVIEW_BODY}
          if [ "$ORIG_LEN" -gt "$MAX_REVIEW_BODY" ]; then
            echo "::warning::Review body ${ORIG_LEN} chars exceeds ${MAX_REVIEW_BODY}; truncating (see gh-rc#184)"
            REVIEW_BODY="${REVIEW_BODY:0:$MAX_REVIEW_BODY}"$'\n\n---\n'"_(auto: body truncated from ${ORIG_LEN} chars; full output in workflow logs)_"
            echo "$REVIEW_BODY" > "$REVIEW_OUT"
          fi

          # ── Post review COMMENT ──
          echo "Posting review to ${REPO}#${PR_NUMBER}..."
          jq -n --rawfile body "$REVIEW_OUT" '{event: "COMMENT", body: $body}' \
            | gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --input -

          # ── Emit success status ──
          # Wrapped in `|| true` to match the error-path versions above so a
          # transient 4xx on this soft-signal status emit can never fail the
          # job after the review COMMENT itself has already been posted.
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=success \
            -f context="check-opencode-review" \
            -f description="OpenCode AI review posted" || true

          # Cleanup
          rm -f "$PROMPT_FILE" "$REVIEW_OUT" "$LOG_OUT"
          echo "== Review complete =="
