name: PR Quality Checks

# Required status checks on every PR. Enforces size caps, test presence,
# single-issue atomicity, and risky-path labeling.
#
# All four gates can be bypassed with a label + bare reason line at col 0
# in the PR body (no markdown). Dependabot PRs auto-pass all checks.
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo.

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review, reopened, labeled, unlabeled]

permissions:
  issues: read
  pull-requests: read
  contents: read

jobs:
  check-size:
    runs-on: [self-hosted, linux, x64, ss-vps]
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Enforce PR size caps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== check-size for ${REPO}#${PR_NUMBER} =="

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json additions,changedFiles,body,labels)"
          additions="$(echo "$pr_json" | jq -r '.additions')"
          changed_files="$(echo "$pr_json" | jq -r '.changedFiles')"
          body="$(echo "$pr_json" | jq -r '.body // ""')"
          labels="$(echo "$pr_json" | jq -r '.labels[].name')"

          has_bypass_label=false
          while IFS= read -r lbl; do
            [ "$lbl" = "size:large-justified" ] && has_bypass_label=true
          done <<< "$labels"

          oversized=false
          reason_parts=()
          if [ "$additions" -gt 500 ]; then
            oversized=true
            reason_parts+=("$additions additions (cap: 500)")
          fi
          if [ "$changed_files" -gt 15 ]; then
            oversized=true
            reason_parts+=("$changed_files files (cap: 15)")
          fi

          if $oversized; then
            if $has_bypass_label; then
              if echo "$body" | grep -qE '^Big-PR-justified: .+'; then
                echo "PR exceeds size caps but has bypass — PASS."
                echo "  Reasons: $(IFS='; '; echo "${reason_parts[*]}")"
                exit 0
              else
                echo "::error::size:large-justified label present but body is missing 'Big-PR-justified: <reason>' line (must be bare line at col 0)."
                exit 1
              fi
            else
              echo "::error::PR is too large: $(IFS='; '; echo "${reason_parts[*]}")."
              echo "::error::Apply label 'size:large-justified' and add a 'Big-PR-justified: <reason>' line to the PR body to bypass."
              exit 1
            fi
          else
            echo "PR size OK ($additions additions, $changed_files files) — PASS."
            exit 0
          fi

  check-tests:
    runs-on: [self-hosted, linux, x64, ss-vps]
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Require tests with code changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== check-tests for ${REPO}#${PR_NUMBER} =="

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body,labels)"
          body="$(echo "$pr_json" | jq -r '.body // ""')"
          labels="$(echo "$pr_json" | jq -r '.labels[].name')"

          has_bypass_label=false
          while IFS= read -r lbl; do
            [ "$lbl" = "no-tests-justified" ] && has_bypass_label=true
          done <<< "$labels"

          changed_files="$(gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only || true)"

          # Test file patterns
          # NOTE: set +o pipefail because grep -c returns 0 on no match and
          # exits 1 under pipefail, killing the subshell silently under set -e.
          test_count="$(
            set +o pipefail
            echo "$changed_files" | grep -cE '^(tests/|test/|__tests__/|.*_test\.py$|.*\.test\.ts$|.*\.spec\.ts$)' || true
          )"
          non_test_count="$(
            set +o pipefail
            echo "$changed_files" | grep -cvE '^(tests/|test/|__tests__/|.*_test\.py$|.*\.test\.ts$|.*\.spec\.ts$)' || true
          )"

          echo "  Test files changed: $test_count"
          echo "  Non-test files changed: $non_test_count"

          if [ "$non_test_count" -eq 0 ]; then
            echo "No non-test source files changed — PASS."
            exit 0
          fi

          if [ "$test_count" -gt 0 ]; then
            echo "Test files were also changed — PASS."
            exit 0
          fi

          # Check if repo has recognized test infrastructure
          has_test_infra=false
          for dir in tests test __tests__; do
            if gh api "repos/$REPO/contents/$dir" --jq '.' >/dev/null 2>&1; then
              has_test_infra=true
              echo "  Found test directory: $dir/"
              break
            fi
          done

          # Also check for test files at repo root
          if ! $has_test_infra; then
            root_files="$(
              set +o pipefail
              gh api "repos/$REPO/contents/" --jq '.[].name' 2>/dev/null || true
            )"
            if echo "$root_files" | grep -qE '_test\.py$|\.test\.ts$|\.spec\.ts$'; then
              has_test_infra=true
              echo "  Found test files at repo root"
            fi
          fi

          if ! $has_test_infra; then
            echo "No recognized test infrastructure found in this repo — PASS (check not applicable)."
            exit 0
          fi

          if $has_bypass_label; then
            if echo "$body" | grep -qE '^Tests-skipped: .+'; then
              echo "Tests not changed but bypass label + reason line present — PASS."
              exit 0
            else
              echo "::error::no-tests-justified label present but body is missing 'Tests-skipped: <reason>' line (must be bare line at col 0)."
              exit 1
            fi
          else
            echo "::error::Code changed ($non_test_count files) without any test file changes, and this repo has test infrastructure."
            echo "::error::Apply label 'no-tests-justified' and add a 'Tests-skipped: <reason>' line to the PR body to bypass."
            exit 1
          fi

  check-atomicity:
    runs-on: [self-hosted, linux, x64, ss-vps]
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Enforce single-issue atomicity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== check-atomicity for ${REPO}#${PR_NUMBER} =="

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body,title,labels)"
          body="$(echo "$pr_json" | jq -r '.body // ""')"
          title="$(echo "$pr_json" | jq -r '.title // ""')"
          labels="$(echo "$pr_json" | jq -r '.labels[].name')"

          has_bypass_label=false
          while IFS= read -r lbl; do
            [ "$lbl" = "multi-issue-justified" ] && has_bypass_label=true
          done <<< "$labels"

          # Extract linked issues from body/title via Closes/Fixes/Resolves keywords.
          linked_same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u
          )"

          # Cross-repo references
          linked_cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+[A-Za-z0-9._-]+/[A-Za-z0-9._-]+#[0-9]+' \
            | awk '{print $NF}' \
            | sort -u
          )"

          # GraphQL closingIssuesReferences (Development sidebar links)
          graphql_refs="$(
            gh api graphql -f query='
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    closingIssuesReferences(first:20) {
                      nodes { number repository { nameWithOwner } }
                    }
                  }
                }
              }' \
              -F owner="${REPO%/*}" -F repo="${REPO#*/}" -F pr="$PR_NUMBER" \
              --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[]
                    | if .repository.nameWithOwner == "'"$REPO"'"
                      then (.number | tostring)
                      else (.repository.nameWithOwner + "#" + (.number | tostring))
                      end' \
          )"

          # Merge same-repo references
          same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_same_repo" "$graphql_refs" \
              | grep -E '^[0-9]+$' | sort -u
          )"
          cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_cross_repo" "$graphql_refs" \
              | grep -E '/.+#[0-9]+$' | sort -u
          )"

          total_same=$(echo "$same_repo" | grep -cv '^$' || true)
          total_cross=$(echo "$cross_repo" | grep -cv '^$' || true)
          total_linked=$((total_same + total_cross))

          echo "  Linked issues: $total_linked (same-repo: $total_same, cross-repo: $total_cross)"

          if [ "$total_linked" -eq 0 ]; then
            echo "PR closes no issues — PASS."
            exit 0
          fi

          if [ "$total_linked" -le 1 ]; then
            echo "PR closes exactly 1 issue — PASS."
            exit 0
          fi

          # >1 issue linked
          all_issues=""
          for n in $same_repo; do
            [ -z "$n" ] && continue
            all_issues="${all_issues}#$n "
          done
          for ref in $cross_repo; do
            [ -z "$ref" ] && continue
            all_issues="${all_issues}$ref "
          done

          if $has_bypass_label; then
            if echo "$body" | grep -qE '^Multi-issue-justified: .+'; then
              echo "PR closes $total_linked issues but has bypass — PASS."
              echo "  Issues: $all_issues"
              exit 0
            else
              echo "::error::multi-issue-justified label present but body is missing 'Multi-issue-justified: <reason>' line (must be bare line at col 0)."
              exit 1
            fi
          else
            echo "::error::PR closes $total_linked issues ($(echo $all_issues | xargs)). Split into one issue per PR."
            echo "::error::Apply label 'multi-issue-justified' and add a 'Multi-issue-justified: <reason>' line to the PR body to bypass."
            exit 1
          fi

  check-risky-paths:
    runs-on: [self-hosted, linux, x64, ss-vps]
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Scan for risky paths and gate on review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== check-risky-paths for ${REPO}#${PR_NUMBER} =="

          changed_files="$(gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only || true)"

          if [ -z "$changed_files" ]; then
            echo "No files changed — PASS."
            exit 0
          fi

          # Match each changed file against risk patterns.
          # Accumulate distinct risk labels. Apply each via gh pr edit.
          risk_labels=""
          for f in $changed_files; do
            [ -z "$f" ] && continue

            # risk:migrations
            if echo "$f" | grep -qE '^(migrations/|alembic/)'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:migrations' 2>/dev/null; then
                risk_labels="${risk_labels}risk:migrations"$'\n'
              fi
            fi

            # risk:secrets
            if echo "$f" | grep -qE '(^|/)(\.env[^/]*$|secrets[^/]*$|vault[^/]*$|[^/]+\.key$|credentials[^/]*$)'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:secrets' 2>/dev/null; then
                risk_labels="${risk_labels}risk:secrets"$'\n'
              fi
            fi

            # risk:auth
            if echo "$f" | grep -qE '(^|/)(auth[^/]*$|authn[^/]*$|authz[^/]*$|oauth[^/]*$|jwt[^/]*$)'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:auth' 2>/dev/null; then
                risk_labels="${risk_labels}risk:auth"$'\n'
              fi
            fi

            # risk:cron
            if echo "$f" | grep -qE '(^|/)cron|\.(systemd|service|timer)$'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:cron' 2>/dev/null; then
                risk_labels="${risk_labels}risk:cron"$'\n'
              fi
            fi

            # risk:webhook
            if echo "$f" | grep -qE '(^|/)webhook|(^|/)hooks/'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:webhook' 2>/dev/null; then
                risk_labels="${risk_labels}risk:webhook"$'\n'
              fi
            fi

            # risk:deploy
            if echo "$f" | grep -qE '(^|/)(install\.sh|deploy\.sh)$|(^|/)Dockerfile|docker-compose.*\.yml$|(^|/)\.github/workflows/'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:deploy' 2>/dev/null; then
                risk_labels="${risk_labels}risk:deploy"$'\n'
              fi
            fi

            # risk:deps
            if echo "$f" | grep -qE '(^|/)(poetry\.lock|package(-lock)?\.json|requirements.*\.txt|Pipfile\.lock|pyproject\.toml|Cargo\.lock)$'; then
              if ! echo "$risk_labels" | grep -qxF 'risk:deps' 2>/dev/null; then
                risk_labels="${risk_labels}risk:deps"$'\n'
              fi
            fi
          done

          risk_count="$(
            set +o pipefail
            echo "$risk_labels" | grep -cv '^$' || true
          )"

          echo "  Risk labels detected: $risk_count"

          if [ "$risk_count" -eq 0 ]; then
            echo "No risky paths touched — PASS."
            exit 0
          fi

          # Apply ≥3 distinct risk labels → also apply risk:multi
          if [ "$risk_count" -ge 3 ]; then
            if ! echo "$risk_labels" | grep -qxF 'risk:multi' 2>/dev/null; then
              risk_labels="${risk_labels}risk:multi"$'\n'
              risk_count=$((risk_count + 1))
              echo "  >=3 risk labels → also applying risk:multi"
            fi
          fi

          # Apply labels to the PR
          echo ""
          echo "  Applying risk labels to PR:"
          while IFS= read -r lbl; do
            [ -z "$lbl" ] && continue
            echo "    - $lbl"
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$lbl" >/dev/null 2>&1 || true
          done <<< "$risk_labels"

          # Now check if risk:reviewed is present among ALL labels
          all_labels="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')"

          has_reviewed=false
          while IFS= read -r lbl; do
            [ "$lbl" = "risk:reviewed" ] && has_reviewed=true
          done <<< "$all_labels"

          if $has_reviewed; then
            echo "  risk:reviewed label is present — PASS."
            exit 0
          else
            applied_labels="$(
              set +o pipefail
              echo "$risk_labels" | grep -v '^$' | paste -sd, -
            )"
            echo "::error::Risky paths detected: $applied_labels"
            echo "::error::Apply label 'risk:reviewed' after reviewing the risky-path changes to pass this check."
            exit 1
          fi
