name: Require spec on claude-ready PRs

# Required status check on every PR. If the PR's linked issue has the
# `claude-ready` label, the issue must also have `has-spec` (i.e., a
# valid ss-spec v=1 comment was posted and validated).
#
# PRs with no linked issue may use the `skip-issue-link` label + a
# "Skip-issue-link: <reason>" line in the body to bypass.
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo.

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review, reopened, labeled, unlabeled]

# Concurrency control — cancels in-flight runs for the same PR when a new
# event (push, label change, edit) arrives. Safe because this workflow is
# idempotent (latest PR state wins) and the required-status semantics are
# preserved: a replaced run is treated as superseded by the newer one.
#
# Without this, label flips and rapid pushes queued 3+ redundant runs per PR.
# Surfaced in ss-gh-runners#125.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: read
  pull-requests: read
  contents: read

jobs:
  check-spec:
    runs-on: [self-hosted, linux, x64, ss-vps]
    steps:
      - name: Check linked issue has valid spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== Checking spec for PR ${REPO}#${PR_NUMBER} =="

          # Resilient read helper (#319): retry a read-only gh call up to 3x to
          # ride out transient 5xx / secondary-rate-limit / self-hosted-runner
          # timeouts, then SEPARATE exit status from output so the caller can
          # choose fail-open vs fail-closed. Prints stdout and returns 0 on
          # success; prints nothing and returns non-zero on persistent failure
          # — never conflating "fetch failed" with "genuinely empty" (the root
          # cause of the fail-OPEN gaps this gate used to have).
          gh_retry() {
            local _out _rc=1 _n
            for _n in 1 2 3; do
              if _out="$("$@")"; then
                printf '%s' "$_out"
                return 0
              else
                # Capture gh's exit code HERE, inside `else`: a bare
                # `if ...; fi` with no else returns 0 when the condition is
                # false, so `_rc=$?` after the `fi` would wrongly read 0 and the
                # helper would return success on failure — silently re-opening
                # the fail-OPEN gap. #319.
                _rc=$?
              fi
              if [ "$_n" -lt 3 ]; then sleep "$((_n * 2))"; fi
            done
            return "$_rc"
          }

          if ! pr_json="$(gh_retry gh pr view "$PR_NUMBER" --repo "$REPO" --json body,title,labels,baseRefName)"; then
            echo "::error::require-spec: could not fetch PR metadata from gh after retries — failing CLOSED. Re-run the check."
            exit 1
          fi
          body="$(echo "$pr_json" | jq -r '.body // ""')"
          title="$(echo "$pr_json" | jq -r '.title // ""')"
          labels="$(echo "$pr_json" | jq -r '.labels[].name')"

          has_skip_issue_link=false
          while IFS= read -r lbl; do
            case "$lbl" in
              skip-issue-link) has_skip_issue_link=true ;;
            esac
          done <<< "$labels"

          # Extract linked issues from body/title via Closes/Fixes/Resolves keywords.
          # Matches: `Closes #42`, `Fixes Second-Summit-Solutions/other#7` (cross-repo).
          # The keyword is anchored with a leading word boundary `(^|[^[:alnum:]])`
          # so prose substrings like `discloses #5` / `foreclosed #9` / `prefixes #7`
          # do not match (#320); the trailing `grep -oE '#[0-9]+'` / `awk '{print $NF}'`
          # strips the captured leading char. This matters more now that the
          # GraphQL path can fall back to this text-parse on a transient failure (#319).
          # NOTE: `set +o pipefail` inside the command-substitution subshell is
          # required because grep exits 1 on no match; with pipefail on, a
          # no-match grep in the pipeline would kill the whole script silently
          # under `set -e`. This is a common pattern for optional-match pipes.
          linked_same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(^|[^[:alnum:]])(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u
          )"

          linked_cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(^|[^[:alnum:]])(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+[A-Za-z0-9._-]+/[A-Za-z0-9._-]+#[0-9]+' \
            | awk '{print $NF}' \
            | sort -u
          )"

          # Also check GraphQL closingIssuesReferences (the Development sidebar link).
          # Retry, then FALL BACK to the body/title text parse on persistent
          # failure. A bare `|| true` would silently drop sidebar-only links;
          # leaving it unguarded aborts the whole gate on a transient GraphQL
          # 502 / secondary-rate-limit (false-FAIL). #319.
          gql_query='query($owner:String!, $repo:String!, $pr:Int!) {
            repository(owner:$owner, name:$repo) {
              pullRequest(number:$pr) {
                closingIssuesReferences(first:20) {
                  nodes { number repository { nameWithOwner } }
                }
              }
            }
          }'
          gql_jq='.data.repository.pullRequest.closingIssuesReferences.nodes[]
                  | if .repository.nameWithOwner == "'"$REPO"'"
                    then (.number | tostring)
                    else (.repository.nameWithOwner + "#" + (.number | tostring))
                    end'
          if ! graphql_refs="$(gh_retry gh api graphql -f query="$gql_query" -F owner="${REPO%/*}" -F repo="${REPO#*/}" -F pr="$PR_NUMBER" --jq "$gql_jq")"; then
            echo "::warning::require-spec: GraphQL closingIssuesReferences fetch failed after retries — falling back to body/title text parse only."
            graphql_refs=""
          fi

          # Merge same-repo references from all sources.
          # Same pipefail hazard as above — grep exits 1 if the merged stream
          # has no matching lines (e.g., no linked issues at all).
          same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_same_repo" "$graphql_refs" \
              | grep -E '^[0-9]+$' | sort -u
          )"
          cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_cross_repo" "$graphql_refs" \
              | grep -E '/.+#[0-9]+$' | sort -u
          )"

          # Count total linked issues.
          total_linked=$(printf '%s\n%s\n' "$same_repo" "$cross_repo" | grep -cv '^$' || true)

          if [ "$total_linked" -eq 0 ]; then
            if $has_skip_issue_link; then
              if echo "$body" | grep -qE '^[[:space:]]*Skip-issue-link:[[:space:]]*\S'; then
                echo "No linked issue, but skip-issue-link override is in place — PASS."
                exit 0
              else
                echo "::error::skip-issue-link label present but body is missing the required 'Skip-issue-link: <reason>' line."
                exit 1
              fi
            else
              echo "::error::PR has no linked issue (no Closes/Fixes/Resolves keyword and no Development-sidebar link)."
              echo "::error::Either add 'Closes #<N>' to the PR body, or set the skip-issue-link label and add a 'Skip-issue-link: <reason>' line."
              exit 1
            fi
          fi

          fail=0

          # Check each same-repo linked issue.
          while IFS= read -r n; do
            [ -z "$n" ] && continue
            # Fail CLOSED on an unreadable label set (#319): the old `|| true`
            # made a transient gh failure look like "no labels" → routed to the
            # "not claude-ready — spec not required" branch, letting a
            # claude-ready + unspecced issue slip through. (The cross-repo loop
            # below already had an empty-guard; this same-repo path was the gap.)
            if ! labels="$(gh_retry gh issue view "$n" --repo "$REPO" --json labels --jq '.labels[].name')"; then
              echo "::error::require-spec: could not read labels on issue #$n after retries — failing CLOSED. Re-run the check."
              fail=1
              continue
            fi
            if echo "$labels" | grep -qx claude-ready; then
              if echo "$labels" | grep -qx has-spec; then
                echo "Issue #$n is claude-ready and has a valid spec — OK."
              else
                echo "::error file=$n::Linked issue #$n is claude-ready but has no valid spec comment."
                echo "::error::Add an 'ss-spec v=1' comment with all 7 required headings, or drop the claude-ready label."
                fail=1
              fi
            else
              echo "Issue #$n is not claude-ready — spec not required."
            fi
          done <<< "$same_repo"

          # Cross-repo linked issues: check them too (owner/repo#N format).
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            other_repo="${ref%#*}"
            other_num="${ref#*#}"
            # Retry to ride out a transient blip, then SEPARATE "fetch failed"
            # from "genuinely no labels" (#319). This must SKIP on a persistent
            # read failure, NEVER fail CLOSED — the workflow authenticates with
            # the repo-scoped GITHUB_TOKEN, which cannot read a *different*
            # private repo in the same org, so such a read fails PERMANENTLY
            # (404), not transiently. Failing closed here would permanently
            # block a legitimate `Closes org/other-private-repo#N` PR that no
            # re-run could fix. Cross-repo spec enforcement is best-effort by
            # design; the GraphQL closingIssuesReferences path above is the
            # primary signal when the token can see the other repo. A
            # successful-but-empty read (issue genuinely has no labels) is not
            # claude-ready → not flagged, as normal.
            if ! labels="$(gh_retry gh issue view "$other_num" --repo "$other_repo" --json labels --jq '.labels[].name')"; then
              echo "Could not read labels on $ref after retries — skipping (cross-repo issues may be private/unreadable by the repo-scoped token)."
              continue
            fi
            if echo "$labels" | grep -qx claude-ready; then
              if echo "$labels" | grep -qx has-spec; then
                echo "Cross-repo $ref is claude-ready and has a valid spec — OK."
              else
                echo "::error::Cross-repo linked issue $ref is claude-ready but has no valid spec."
                fail=1
              fi
            fi
          done <<< "$cross_repo"

          exit $fail
