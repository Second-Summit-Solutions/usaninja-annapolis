name: Validate issue spec

# Keeps the has-spec / needs-spec labels in sync with the presence of a
# valid `ss-spec v=1` comment on `claude-ready` issues.
#
# Contract:
#   - Only acts on issues labeled `claude-ready`.
#   - `skip-spec` + a body line "Skip-spec: <reason>" is an override.
#   - Spec comment must start with: <!-- ss-spec v=1 generated_at=... generated_by=... -->
#   - Spec comment must contain all seven headings:
#     ## TASK, ## FILES, ## CONTEXT, ## REQUIREMENTS, ## CONSTRAINTS,
#     ## EXECUTION, ## VERIFICATION — each with at least one non-blank line below.
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo; PR changes
# upstream and re-roll via the rollout script.

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]
  issue_comment:
    types: [created, edited, deleted]

# Concurrency control — cancels in-flight validation for the same issue when a
# new event arrives. The workflow is idempotent (latest state wins for has-spec /
# needs-spec label sync), so cancelling a mid-flight run is safe and correct.
#
# Without this, an active session that files an issue + posts a spec comment +
# applies a few labels can queue 5+ redundant runs per issue. At org scale this
# saturates the self-hosted runner pool and pushes legitimately-blocking
# workflows (Lint, check-spec, CI) deeper into the FIFO.
#
# Group key falls back to 'all' for events lacking an issue number (defensive;
# the job-level `if:` already gates pull_request comments out, but the
# concurrency group is evaluated before that filter).
#
# Fixes github-repo-creator#156.
concurrency:
  group: validate-issue-spec-${{ github.event.issue.number || 'all' }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  validate:
    runs-on: [self-hosted, linux, x64, ss-vps]
    # Skip PR comment events — issue_comment fires for both, we only care about issues.
    if: ${{ github.event.issue.pull_request == null }}
    steps:
      - name: Validate spec and sync labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          echo "== Validating spec on ${REPO}#${ISSUE_NUMBER} =="

          # Fetch issue labels + body in one call.
          issue_json="$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels,body)"
          labels="$(echo "$issue_json" | jq -r '.labels[].name')"
          body="$(echo "$issue_json" | jq -r '.body // ""')"

          has_claude_ready=false
          has_skip_spec=false
          has_needs_spec=false
          has_has_spec=false
          while IFS= read -r lbl; do
            case "$lbl" in
              claude-ready) has_claude_ready=true ;;
              skip-spec)    has_skip_spec=true ;;
              needs-spec)   has_needs_spec=true ;;
              has-spec)     has_has_spec=true ;;
            esac
          done <<< "$labels"

          if ! $has_claude_ready; then
            echo "Issue is not claude-ready — exiting."
            exit 0
          fi

          # skip-spec override: must be accompanied by a Skip-spec reason line.
          if $has_skip_spec; then
            if echo "$body" | grep -qE '^[[:space:]]*Skip-spec:[[:space:]]*\S'; then
              echo "skip-spec override active — clearing needs-spec."
              $has_needs_spec && gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels/needs-spec" -X DELETE >/dev/null || true
              $has_has_spec   || gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -X POST -f 'labels[]=has-spec' >/dev/null || true
              exit 0
            else
              echo "skip-spec label present but no 'Skip-spec: <reason>' line in body — rejecting override."
            fi
          fi

          # Fetch all comments and look for a valid spec.
          # CRITICAL: emit the full matching body atomically inside jq.
          # NEVER pipe this through `head -n 1` — that truncates multi-line specs to the
          # sentinel line, mislabels valid specs as needs-spec, and silently breaks the
          # contract. See github-repo-creator#52.
          comments_json="$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" --paginate)"
          # NOTE: guard the select predicate with `(.body // "")` — a comment
          # whose body is JSON null (deleted-account / minimized / API-edge
          # comment) makes `.body | test(...)` raise "null cannot be matched"
          # (jq exit 5). `first()` short-circuits only AFTER the predicate runs,
          # so a null-body comment appearing BEFORE the real spec aborts the
          # whole expression under `set -e` and the spec is never found. #321.
          spec_comment="$(
            echo "$comments_json" \
            | jq -r 'first(.[] | select((.body // "") | test("^<!-- ss-spec v=1 [^>]+-->"; "m"))).body // ""'
          )"

          if [ -z "$spec_comment" ]; then
            echo "No ss-spec v=1 comment found."
            valid=false
          else
            echo "Candidate spec comment found — validating schema."
            required=(TASK FILES CONTEXT REQUIREMENTS CONSTRAINTS EXECUTION VERIFICATION)
            missing=()
            for h in "${required[@]}"; do
              # Match '## HEADING' at start of a line (allow trailing whitespace).
              # here-string, NOT `echo "$spec_comment" | grep -q`: under `set -o
              # pipefail`, grep -q short-circuits on the first heading match and
              # closes the pipe; echo then dies with SIGPIPE on the unread
              # remainder of a large (multibyte-dominated) spec, pipefail
              # propagates the non-zero, and `if !` flips a PRESENT heading to
              # "missing" — the same class as #316. #321.
              if ! grep -qE "^## ${h}[[:space:]]*$" <<<"$spec_comment"; then
                missing+=("$h")
              fi
            done
            if [ ${#missing[@]} -eq 0 ]; then
              echo "All 7 required headings present."
              valid=true
            else
              echo "Missing headings: ${missing[*]}"
              valid=false
            fi
          fi

          if $valid; then
            echo "Spec valid — setting has-spec, clearing needs-spec."
            $has_has_spec   || gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -X POST -f 'labels[]=has-spec' >/dev/null
            $has_needs_spec && gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels/needs-spec" -X DELETE >/dev/null || true
          else
            echo "Spec missing/invalid — setting needs-spec, clearing has-spec."
            $has_needs_spec || gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -X POST -f 'labels[]=needs-spec' >/dev/null
            $has_has_spec   && gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/labels/has-spec" -X DELETE >/dev/null || true
          fi
